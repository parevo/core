{{define "content"}}
<div class="bg-slate-800 rounded-lg p-4">
  <h2 class="text-sm font-medium text-slate-400 mb-3">Registered users</h2>
  {{if .Users}}
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="text-left text-slate-400 text-sm">
          <th class="py-2 px-3">ID</th>
          <th class="py-2 px-3">Email</th>
          <th class="py-2 px-3">Name</th>
          <th class="py-2 px-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        {{range .Users}}
        <tr class="border-t border-slate-700">
          <td class="py-2 px-3 font-mono text-sm">{{.ID}}</td>
          <td class="py-2 px-3">{{.Email}}</td>
          <td class="py-2 px-3">{{.Name}}</td>
          <td class="py-2 px-3">
            <a href="{{$.BasePath}}/permissions?subject_id={{.ID}}&tenant_id={{$.TenantID}}" class="px-2 py-1 text-xs rounded bg-slate-600 hover:bg-slate-500">Permissions</a>
            <a href="{{$.BasePath}}/sessions?user_id={{.ID}}" class="px-2 py-1 text-xs rounded bg-slate-600 hover:bg-slate-500 ml-1">Sessions</a>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{else}}
  <p class="text-slate-500 py-8 text-center">No users yet.</p>
  {{end}}
</div>
{{end}}
