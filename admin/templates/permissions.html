{{define "content"}}
<div class="bg-slate-800 rounded-lg p-4 mb-4">
  <h2 class="text-sm font-medium text-slate-400 mb-3">Permissions</h2>
  <form method="GET" action="{{.BasePath}}/permissions" class="flex flex-wrap gap-2 mb-4">
    <input name="subject_id" value="{{.SubjectID}}" placeholder="Subject ID" class="px-3 py-2 rounded bg-slate-700 border border-slate-600 text-slate-100 placeholder-slate-500 min-w-[140px]">
    <input name="tenant_id" value="{{.TenantIDForm}}" placeholder="Tenant ID" class="px-3 py-2 rounded bg-slate-700 border border-slate-600 text-slate-100 placeholder-slate-500 min-w-[140px]">
    <button type="submit" class="px-4 py-2 rounded bg-sky-500 hover:bg-sky-400 text-slate-900 font-medium">Load</button>
  </form>
  {{if .Permissions}}
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="text-left text-slate-400 text-sm">
          <th class="py-2 px-3">Permission</th>
          <th class="py-2 px-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        {{range .Permissions}}
        <tr class="border-t border-slate-700">
          <td class="py-2 px-3">{{.}}</td>
          <td class="py-2 px-3">
            <form action="{{$.BasePath}}/api/permissions?subject_id={{$.SubjectID}}&tenant_id={{$.TenantIDForm}}&permission={{.}}&action=revoke" method="POST" class="inline" onsubmit="return confirm('Revoke?')">
              <button type="submit" class="px-2 py-1 text-xs rounded bg-red-600 hover:bg-red-500">Revoke</button>
            </form>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{else}}
  <p class="text-slate-500 py-8 text-center">No permissions for this subject/tenant.</p>
  {{end}}
</div>
<div class="bg-slate-800 rounded-lg p-4">
  <h2 class="text-sm font-medium text-slate-400 mb-3">Grant permission</h2>
  <form action="{{.BasePath}}/api/permissions" method="POST" class="flex flex-wrap gap-2">
    <input name="subject_id" value="{{.SubjectID}}" placeholder="Subject ID" required class="px-3 py-2 rounded bg-slate-700 border border-slate-600 text-slate-100 placeholder-slate-500 min-w-[140px]">
    <input name="tenant_id" value="{{.TenantIDForm}}" placeholder="Tenant ID" required class="px-3 py-2 rounded bg-slate-700 border border-slate-600 text-slate-100 placeholder-slate-500 min-w-[140px]">
    <input name="permission" placeholder="e.g. orders:read" required class="px-3 py-2 rounded bg-slate-700 border border-slate-600 text-slate-100 placeholder-slate-500 min-w-[140px]">
    <button type="submit" class="px-4 py-2 rounded bg-sky-500 hover:bg-sky-400 text-slate-900 font-medium">Grant</button>
  </form>
</div>
{{end}}
